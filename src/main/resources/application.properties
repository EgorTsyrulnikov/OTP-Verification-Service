server.port=8080

# PostgreSQL Connection
# Для проверяющего: база данных по умолчанию 'postgres'. 
# Если вы хотите использовать свою БД, измените URL: jdbc:postgresql://localhost:5432/ваша_бд
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Схема таблиц инициализируется автоматически в классе DatabaseInitializer (на чистом JDBC)
spring.sql.init.mode=never

# Logging
logging.level.com.promoit=DEBUG
logging.level.org.springframework=INFO
